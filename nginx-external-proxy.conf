# ============================================================
#  Nginx Reverse Proxy — External Server (coe.wu-iotfarm.org)
#  Proxies /andrographis/ to Raspberry Pi
# ============================================================
#
#  วางไฟล์นี้ที่เซิร์ฟเวอร์กลางที่ให้บริการ coe.wu-iotfarm.org
#  cp nginx-external-proxy.conf /etc/nginx/sites-available/smartfarm-proxy
#  ln -s /etc/nginx/sites-available/smartfarm-proxy /etc/nginx/sites-enabled/
#  nginx -t && sudo systemctl reload nginx
#
#  แก้ PI_IP เป็น IP ของ Raspberry Pi จริง

upstream smartfarm_backend {
    server <PI_IP>:80;          # ← เปลี่ยนเป็น IP ของ Raspberry Pi
    # ตัวอย่าง: server 192.168.1.100:80;
}

# เพิ่ม location block นี้ใน server block ของ coe.wu-iotfarm.org
# ─────────────────────────────────────────────────────────────

# ── ใช้ภายใน server { ... } block ที่มีอยู่แล้ว ──

# Frontend + API + WebSocket ทั้งหมดอยู่ภายใต้ /andrographis/
location /andrographis/ {
    proxy_pass         http://smartfarm_backend/andrographis/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
}

# Redirect bare path (no trailing slash) → trailing slash
location = /andrographis {
    return 301 /andrographis/;
}

# WebSocket (ต้องแยก location เพราะต้อง set Upgrade headers)
location /andrographis/ws {
    proxy_pass         http://smartfarm_backend/andrographis/ws;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_read_timeout 86400s;
}

